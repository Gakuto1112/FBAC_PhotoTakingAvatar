name: Cleanup BBModels

on:
  push:
    branches:
      - main
    paths:
      - src/models/**/*.bbmodel
      - scripts/**
      - .github/workflows/cleanup_bbmodels.yml

permissions:
  contents: write

jobs:
  cleanup:
    name: Cleanup BBModels
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: "auto"
      - name: Set up Python 3.14.3
        run: uv python install 3.14.3
      - name: Install dependencies for build scripts
        run: uv sync
        working-directory: ./scripts/
      - name: Cleanup BBModel files
        run: uv run bbmodel_cleaner.py
        working-directory: ./scripts/
      - id: check_diff
        name: Check diff
        continue-on-error: true
        run: |
          git add -N --all
          git diff --exit-code
      - name: Commit and push
        if: ${{ steps.check_diff.outcome == 'failure' }}
        run: |
          git remote set-url origin https://github-actions:${{ github.token }}@github.com/${{ github.repository }}
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m '[GitHub Actions] BBモデルのクリーンアップ' -m '対象のコミット: ${{ github.sha }}'
          git push origin
